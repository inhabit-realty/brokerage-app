name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - name: Build (with placeholder env so pre-render doesn't fail)
        run: npm run build
        env:
          LISTING_DATA_API_KEY: ld_live_dummy_for_ci_build_only
          LISTING_DATA_BASE_URL: https://example.invalid
